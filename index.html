<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaoZen AI | Automatización Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #C200FB;
            --bg: #00120B;
            --card-bg: rgba(3, 29, 21, 0.6);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color:white; line-height:1.6; }
        
        /* Navegación */
        nav { display:flex; justify-content:space-between; align-items:center; padding:20px 10%; position:fixed; width:100%; top:0; background:rgba(0,18,11,0.8); backdrop-filter:blur(15px); z-index:1000; border-bottom: 1px solid rgba(194,0,251,0.2); }
        .logo { font-size:1.5rem; font-weight:700; color:var(--primary); letter-spacing: -1px; }
        nav a { text-decoration:none; color:white; margin-left:25px; opacity:0.8; font-size:0.9rem; transition:0.3s; }
        nav a:hover { opacity:1; color:var(--primary); }

        /* Hero mejorado */
        .hero { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 20px; background:radial-gradient(circle at center, #05291f 0%, #00120B 70%); }
        .hero h1 { font-size: 3.5rem; color:white; margin-bottom:20px; line-height: 1.1; }
        .hero span { color: var(--primary); }
        .cta { display:inline-block; margin-top:30px; padding:15px 35px; background:var(--primary); border-radius:8px; text-decoration:none; color:white; font-weight:600; transition:0.3s; }
        .cta:hover { transform:translateY(-3px); box-shadow:0 10px 20px rgba(194,0,251,0.3); }

        /* Secciones */
        .section { padding:100px 10%; }
        .services { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
        .card { background: var(--card-bg); padding:40px; border-radius:16px; border: 1px solid rgba(255,255,255,0.05); }
        .card h3 { color:var(--primary); margin-bottom:15px; }

        .whatsapp-float { position:fixed; bottom:30px; right:30px; background:#25D366; color:white; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 4px 15px rgba(37,211,102,0.4); z-index:1000; transition:0.3s; }
        .whatsapp-float:hover { transform:scale(1.1); }
    </style>
</head>
<body>

<nav>
    <div class="logo">BaoZen AI</div>
    <div>
        <a href="#servicios">Servicios</a>
        <a href="#proceso">Proceso</a>
    </div>
</nav>

<section class="hero">
    <h1 data-aos="fade-up">Automatiza tu empresa con<br> <span>Inteligencia Artificial</span></h1>
    <p data-aos="fade-up" data-aos-delay="200">Reducción de costos y máxima productividad para tu negocio.</p>
    <a class="cta whatsapp-link" href="#">Hablar por WhatsApp</a>
</section>

<a class="whatsapp-float whatsapp-link" href="#">💬</a>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });

    // Configuración centralizada de WhatsApp
    const phone = "573152870822";
    const msg = encodeURIComponent("Hola, me interesa automatizar mi empresa con IA.");
    const waUrl = `https://wa.me/${phone}?text=${msg}`;

    // Asignar a todos los elementos con clase whatsapp-link
    document.querySelectorAll(".whatsapp-link").forEach(el => el.href = waUrl);
</script>
</body>
</html>
